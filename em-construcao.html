<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PVS Variedades - Em Construção</title>

<style>

html,body{
margin:0;
padding:0;
height:100%;
font-family:Arial, Helvetica, sans-serif;
color:white;
}

/* FUNDO */

body{

background-image:url("images/construcao.webp");

background-size:contain;
background-repeat:no-repeat;
background-position:center;

background-color:#0f0f0f;

display:flex;
align-items:center;
justify-content:center;

}

/* OVERLAY */

body::before{

content:"";
position:absolute;

width:100%;
height:100%;

background:rgba(0,0,0,.65);

}

/* CARD */

.card{

position:relative;

width:90%;
max-width:520px;

background:rgba(255,255,255,.06);

backdrop-filter:blur(10px);

border:1px solid rgba(255,255,255,.15);

padding:40px;

border-radius:14px;

text-align:center;

box-shadow:
0 30px 60px rgba(0,0,0,.6);

}

/* TITULO */

.status{

font-size:26px;
margin-bottom:10px;

}

.substatus{

opacity:.8;
margin-bottom:30px;

}

/* BOTÃO */

.btn{

display:inline-block;

padding:14px 32px;

border:2px solid white;

border-radius:6px;

text-decoration:none;

color:white;

font-weight:bold;

letter-spacing:1px;

transition:.25s;

}

/* HOVER */

.btn:hover{

background:white;
color:black;

transform:scale(1.05);

}

/* MOBILE */

@media (max-width:700px){

body{
background-size:cover;
}

.card{
padding:30px;
}

.status{
font-size:22px;
}

}

</style>

</head>

<body>

<div class="card">

<div class="status">
Estamos construindo algo especial
</div>

<div class="substatus">
Em breve nosso e-commerce estará online.
</div>

<a class="btn" href="/index.html">
Voltar para página inicial
</a>

</div>

</body>

</html>
