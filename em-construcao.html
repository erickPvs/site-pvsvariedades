<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PVS Variedades - Em Construção</title>

<style>

html,body{
margin:0;
padding:0;
height:100%;
font-family:Arial, Helvetica, sans-serif;
color:white;
}

/* FUNDO */

body{

background-image:url("images/construcao.webp");

background-size:cover;
background-position:center;

display:flex;
align-items:center;
justify-content:center;

}

/* OVERLAY ESCURO */

body::before{

content:"";
position:absolute;

width:100%;
height:100%;

background:rgba(0,0,0,.65);

}

/* CARD CENTRAL */

.card{

position:relative;

width:90%;
max-width:650px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(12px);

border:1px solid rgba(255,255,255,.15);

padding:50px;

border-radius:14px;

text-align:center;

box-shadow:
0 40px 80px rgba(0,0,0,.5);

}

/* TITULO */

.logo{

font-size:36px;
font-weight:bold;
letter-spacing:2px;

margin-bottom:5px;

}

/* EMPRESA */

.empresa{

font-size:16px;
opacity:.9;
margin-bottom:30px;

}

/* STATUS */

.status{

font-size:22px;
margin-bottom:10px;

}

.substatus{

opacity:.8;
margin-bottom:35px;

}

/* INFO */

.info{

font-size:15px;
line-height:1.8;

margin-bottom:40px;

}

/* BOTÃO */

.btn{

display:inline-block;

padding:14px 32px;

border:2px solid white;

border-radius:6px;

text-decoration:none;

color:white;

font-weight:bold;

transition:.25s;

}

/* HOVER */

.btn:hover{

background:white;
color:black;

transform:scale(1.05);

}

/* MOBILE */

@media (max-width:600px){

.card{
padding:35px;
}

.logo{
font-size:28px;
}

}

</style>

</head>

<body>

<div class="card">

<div class="logo">
PVS Variedades
</div>

<div class="empresa">
PVS Variedades E-commerce Ltda
</div>

<div class="status">
Estamos construindo algo especial
</div>

<div class="substatus">
Em breve nosso e-commerce estará online.
</div>

<div class="info">

CNPJ: 62.012.100/0001-95<br>

WhatsApp: (11) 94740-7823<br>

Email: contato@pvsvariedades.com.br

</div>

<a class="btn" href="/index.html">
Voltar para página inicial
</a>

</div>

</body>

</html>
