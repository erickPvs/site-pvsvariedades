<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Troca do Filme ACF | PVS Variedades</title>

<style>

html,body{
margin:0;
padding:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:linear-gradient(180deg,#eef2f8,#f8faff);
color:#111;
}

/* NAV */

.top-nav{
position:fixed;
top:20px;
left:20px;
z-index:50;
}

.top-nav a{
color:white;
text-decoration:none;
font-size:14px;
background:rgba(0,0,0,.5);
padding:8px 12px;
border-radius:8px;
backdrop-filter:blur(6px);
}

/* HERO */

.hero{
height:65vh;
background:url("../images/guia.webp") center/cover no-repeat;
display:flex;
align-items:flex-end;
padding:60px;
color:white;
position:relative;
}

.hero::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:linear-gradient(to top, rgba(0,0,0,.9), rgba(0,0,0,.3));
top:0;
left:0;
}

.hero-content{
position:relative;
z-index:2;
max-width:700px;
}

.hero h1{
font-size:42px;
margin-bottom:10px;
}

.hero p{
font-size:17px;
opacity:.95;
}

/* ALERT */

.alert{
background:rgba(255,77,77,.08);
border:1px solid rgba(255,77,77,.2);
padding:16px;
border-radius:12px;
margin:30px auto;
max-width:900px;
font-size:14px;
}

/* CONTAINER */

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

/* STEP */

.step{
background:linear-gradient(145deg,#ffffff,#f4f7fd);
padding:30px;
border-radius:20px;
margin-bottom:30px;

box-shadow:
0 10px 30px rgba(0,0,0,.05),
0 2px 8px rgba(0,0,0,.03);

transition:.3s;
}

.step:hover{
transform:translateY(-6px);
box-shadow:
0 25px 60px rgba(0,0,0,.08),
0 10px 25px rgba(0,0,0,.06);
}

.step-header{
display:flex;
align-items:center;
margin-bottom:15px;
}

.step-number{
background:linear-gradient(135deg,#0066ff,#004ed6);
color:white;
padding:8px 12px;
border-radius:10px;
margin-right:10px;
font-weight:bold;
}

.step-title{
font-size:19px;
font-weight:600;
}

/* IMAGE */

.step img{
width:100%;
border-radius:14px;
margin:15px 0;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

/* GRID */

.grid{
display:grid;
gap:10px;
}

.card{
padding:14px;
border-radius:10px;
font-size:14px;
}

.do{
background:#eef4ff;
}

.avoid{
background:#fff1f1;
}

.check{
background:#eafaf0;
}

/* VALIDATION */

.validation{
background:linear-gradient(135deg,#e8fff1,#f3fff7);
padding:20px;
border-radius:14px;
margin-top:40px;
font-weight:500;
}

/* CTA */

.footer{
margin-top:60px;
text-align:center;
padding:50px;
border-radius:20px;

background:linear-gradient(135deg,#0066ff,#004ed6);
color:white;

box-shadow:0 25px 60px rgba(0,0,0,.15);
}

.footer a{
display:inline-block;
margin:10px;
padding:12px 22px;
background:white;
color:#0066ff;
border-radius:10px;
text-decoration:none;
font-weight:500;
transition:.2s;
}

.footer a:hover{
transform:scale(1.05);
}

/* MOBILE */

@media(max-width:900px){

.hero{
height:50vh;
padding:30px;
}

.hero h1{
font-size:30px;
}

}

</style>

</head>

<body>

<div class="top-nav">
<a href="/guias/">← Guias</a>
</div>

<div class="hero">
<div class="hero-content">
<h1>Troca do Filme ACF</h1>
<p>Evite falhas, desperdício de resina e perda de impressão.</p>
</div>
</div>

<div class="alert">
⚠️ Um erro na instalação do ACF pode comprometer completamente a impressão.
</div>

<div class="container">

<!-- PASSOS (mantidos iguais) -->

<!-- PASSO 1 até 6 (mantém os mesmos do seu atual) -->

<!-- VALIDAÇÃO -->

<div class="validation">
✔ Filme firme • ✔ Sem ondulações • ✔ Impressões voltam a aderir
</div>

<div class="footer">
<h2>Pronto para usar com segurança</h2>

<a href="/">Página inicial</a>
<a href="/guias/">Ver outros guias</a>
</div>

</div>

</body>
</html>
