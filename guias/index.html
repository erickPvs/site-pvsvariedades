<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Guias | PVS Variedades</title>

<style>

html,body{
margin:0;
padding:0;
font-family:Arial, Helvetica, sans-serif;
background:#f2f2f2;
overflow-x:hidden;
}

/* CONTAINER */

.container{
display:flex;
min-height:100vh;
width:100%;
}

/* PAINEL */

.panel{
flex:1;
position:relative;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
cursor:pointer;
transition:.45s;
}

/* IMAGEM */

.panel::before{
content:"";
position:absolute;
width:110%;
height:110%;
background-size:cover;
background-position:center;
background-repeat:no-repeat;

filter:grayscale(100%) brightness(1.25) opacity(.45);

transition:.4s;
}

/* GRADIENTE */

.panel::after{
content:"";
position:absolute;
width:100%;
height:100%;

background:linear-gradient(
to bottom,
rgba(0,0,0,0) 20%,
rgba(0,0,0,.55) 100%
);

opacity:.8;
transition:.45s;
}

/* HOVER */

.panel:hover::before{
filter:grayscale(0%) brightness(1) opacity(1);
transform:scale(1.05);
}

.panel:hover::after{
opacity:.45;
}

.panel:hover{
flex:1.4;
z-index:5;

box-shadow:
0 40px 80px rgba(0,0,0,.35),
0 10px 30px rgba(0,0,0,.25);
}

/* ACTIVE */

.container:hover .panel{
filter:blur(2px) brightness(.85);
}

.container:hover .panel:hover{
filter:none;
}

/* IMAGENS */

.acf::before{
background-image:url("../images/guia.webp");
}

.posicionamento::before{
background-image:url("../images/minime.webp");
}

/* TEXTO */

.overlay{
position:absolute;
bottom:20px;
width:70%;
text-align:center;
color:white;
z-index:3;
}

.title{
font-size:32px;
font-weight:bold;
margin-bottom:10px;
}

.subtitle{
font-size:16px;
margin-bottom:12px;
}

.badge{
font-size:13px;
opacity:.8;
}

/* LINK */

.panel a{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
z-index:5;
}

/* NAV */

.top-nav{
position:absolute;
top:20px;
left:20px;
z-index:10;
}

.top-nav a{
color:white;
text-decoration:none;
font-size:14px;
background:rgba(0,0,0,.4);
padding:8px 12px;
border-radius:8px;
}

/* MOBILE */

@media (max-width:900px){

.container{
flex-direction:column;
}

.panel{
height:50vh;
}

.container:hover .panel{
filter:none;
}

}

</style>

</head>

<body>

<div class="top-nav">
<a href="/">← Início</a>
</div>

<div class="container">

<!-- ACF -->

<div class="panel acf">

<a href="/guias/troca-acf.html"></a>

<div class="overlay">

<div class="title">Troca do Filme ACF</div>
<div class="subtitle">Manutenção essencial para evitar falhas</div>

</div>

</div>

<!-- POSICIONAMENTO -->

<div class="panel posicionamento">

<div class="overlay">

<div class="title">Posicionamento e furação</div>
<div class="subtitle">Precisão e acabamento profissional</div>
<div class="badge">Em breve</div>

</div>

</div>

</div>

</body>
</html>
