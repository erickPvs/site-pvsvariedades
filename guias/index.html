<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guias | PVS Variedades</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background: #f5f7fb;
    color: #111;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 60px 20px;
}

.top-nav a {
    color: #0066ff;
    text-decoration: none;
    font-size: 14px;
}

.hero {
    margin: 40px 0 60px;
}

.hero h1 {
    font-size: 34px;
}

.hero p {
    color: #555;
}

.trilha {
    margin-bottom: 50px;
}

.trilha h2 {
    margin-bottom: 20px;
}

.row {
    display: flex;
    gap: 20px;
    overflow-x: auto;
}

.card {
    min-width: 260px;
    background: linear-gradient(145deg, #ffffff, #f8faff);
    border-radius: 18px;
    padding: 25px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.06);
    text-decoration: none;
    color: inherit;
}

.card:hover {
    transform: translateY(-6px);
}

.card-title {
    font-size: 18px;
}

.card-desc {
    font-size: 14px;
    color: #666;
}

.disabled {
    opacity: 0.4;
}

.badge {
    font-size: 12px;
    color: #0066ff;
    margin-top: 10px;
}
</style>

</head>

<body>

<div class="container">

<div class="top-nav">
    <a href="/">← Voltar para início</a>
</div>

<div class="hero">
    <h1>Guias técnicos</h1>
    <p>Resolva problemas e melhore seus resultados.</p>
</div>

<div class="trilha">
    <h2>⚙️ Manutenção</h2>

    <div class="row">

        <a href="/guias/troca-acf.html" class="card">
            <div class="card-title">Troca do Filme ACF</div>
            <div class="card-desc">
                Procedimento completo para evitar falhas.
            </div>
        </a>

        <div class="card disabled">
            <div class="card-title">Posicionamento e furação</div>
            <div class="card-desc">
                Guia em desenvolvimento.
            </div>
            <div class="badge">Em breve</div>
        </div>

    </div>

</div>

</div>

</body>
</html>
