<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Guias | PVS Variedades</title>

<style>

html,body{
margin:0;
padding:0;
font-family:Arial, Helvetica, sans-serif;
background:#f2f2f2;
overflow:hidden;
}

/* NAV */

.top-nav{
position:absolute;
top:20px;
left:20px;
z-index:20;
}

.top-nav a{
color:white;
text-decoration:none;
font-size:14px;
background:rgba(0,0,0,.4);
padding:8px 12px;
border-radius:8px;
}

/* HERO */

.hero{
position:absolute;
top:90px;
width:100%;
text-align:center;
color:white;
z-index:15;
}

.hero h1{
font-size:34px;
margin-bottom:10px;
}

.hero p{
font-size:16px;
opacity:.85;
}

/* CONTAINER */

.container{
display:flex;
min-height:100vh;
width:100%;
}

/* PAINEL */

.panel{
flex:1;
position:relative;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
cursor:pointer;
transition:.45s;
border:1px solid rgba(255,255,255,.08);
}

/* IMAGEM */

.panel::before{
content:"";
position:absolute;
width:110%;
height:110%;
background-size:cover;
background-position:center;
background-repeat:no-repeat;

filter:grayscale(100%) brightness(1.25) opacity(.45);

transition:.4s;
}

/* GRADIENTE */

.panel::after{
content:"";
position:absolute;
width:100%;
height:100%;

background:linear-gradient(
to bottom,
rgba(0,0,0,0) 20%,
rgba(0,0,0,.6) 100%
);

opacity:.85;
transition:.45s;
}

/* HOVER */

.panel:hover::before{
filter:grayscale(0%) brightness(1) opacity(1);
transform:scale(1.05);
}

.panel:hover::after{
opacity:.45;
}

.panel:hover{
flex:1.4;
z-index:5;

box-shadow:
0 40px 80px rgba(0,0,0,.35),
0 10px 30px rgba(0,0,0,.25);
}

/* ACTIVE */

.container:hover .panel{
filter:blur(2px) brightness(.85);
}

.container:hover .panel:hover{
filter:none;
}

/* IMAGENS */

.acf::before{
background-image:url("../images/guia.webp");
}

.posicionamento::before{
background-image:url("../images/minime.webp");
}

/* TEXTO */

.overlay{
position:absolute;
bottom:30px;
width:70%;
text-align:center;
color:white;
z-index:3;
}

.title{
font-size:32px;
font-weight:bold;
margin-bottom:10px;
}

.subtitle{
font-size:16px;
margin-bottom:10px;
}

.badge{
font-size:12px;
background:rgba(255,255,255,.15);
padding:6px 10px;
border-radius:8px;
display:inline-block;
}

/* LINK */

.panel a{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
z-index:5;
}

/* DESATIVADO */

.disabled{
opacity:.65;
filter:grayscale(40%);
cursor:not-allowed;
}

/* MOBILE */

@media (max-width:900px){

.container{
flex-direction:column;
}

.panel{
height:50vh;
}

.container:hover .panel{
filter:none;
}

.hero{
top:60px;
}

}

</style>

</head>

<body>

<!-- NAV -->
<div class="top-nav">
<a href="/">← Página inicial</a>
</div>

<!-- HERO -->
<div class="hero">
<h1>Guias técnicos</h1>
<p>Aprenda a resolver problemas e obter resultados profissionais</p>
</div>

<div class="container">

<!-- ACF -->

<div class="panel acf">

<a href="/guias/troca-acf.html"></a>

<div class="overlay">

<div class="title">Troca do Filme ACF</div>
<div class="subtitle">Evite falhas e mantenha qualidade constante</div>

</div>

</div>

<!-- POSICIONAMENTO -->

<div class="panel posicionamento disabled">

<div class="overlay">

<div class="title">Posicionamento e furação</div>
<div class="subtitle">Melhore encaixe, alinhamento e resultado final</div>
<div class="badge">Em breve</div>

</div>

</div>

</div>

</body>

</html>
