<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>PVS Variedades</title>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;

/* fundo técnico leve */
background:
linear-gradient(#f4f4f4,#eaeaea),
repeating-linear-gradient(
0deg,
rgba(0,0,0,0.03) 0px,
rgba(0,0,0,0.03) 1px,
transparent 1px,
transparent 40px
),
repeating-linear-gradient(
90deg,
rgba(0,0,0,0.03) 0px,
rgba(0,0,0,0.03) 1px,
transparent 1px,
transparent 40px
);

overflow:hidden;
}

/* container */

.container{
display:flex;
height:100vh;
width:100vw;
}

/* painel */

.panel{

flex:1;

display:flex;
align-items:center;
justify-content:center;

position:relative;

cursor:pointer;
overflow:hidden;

transition:all .45s ease;

animation:entrada 0.9s ease forwards;
opacity:0;
}

.panel:nth-child(1){animation-delay:.15s}
.panel:nth-child(2){animation-delay:.3s}
.panel:nth-child(3){animation-delay:.45s}


/* watermark imagem */

.panel::before{

content:"";

position:absolute;

width:100%;
height:100%;

background-position:center;
background-repeat:no-repeat;
background-size:58%;

filter:grayscale(100%) brightness(.85) opacity(.35);

transition:all .45s ease;
}


/* hover */

.panel:hover{
flex:1.12;
}

.panel:hover::before{

filter:grayscale(0%) brightness(1) opacity(.95);

transform:scale(1.08);
}


/* luz */

.panel::after{

content:"";

position:absolute;

top:0;
left:-120%;

width:120%;
height:100%;

background:linear-gradient(
90deg,
transparent,
rgba(255,255,255,.35),
transparent
);

transition:.8s;
}

.panel:hover::after{
left:120%;
}


/* imagens */

.guia::before{
background-image:url("images/guia.webp");
}

.loja::before{
background-image:url("images/loja.webp");
background-size:55%;
}

.minime::before{
background-image:url("images/minime.webp");
background-size:50%;
}


/* overlay */

.overlay{

position:relative;

text-align:center;

z-index:2;
}

/* texto */

.title{

font-size:42px;
font-weight:bold;

letter-spacing:2px;

color:#222;

text-shadow:0 4px 18px rgba(0,0,0,.2);
}

/* botão */

.btn{

margin-top:18px;

padding:11px 26px;

border:2px solid #222;

display:inline-block;

font-size:14px;

letter-spacing:1px;

transition:.25s;
}

.panel:hover .btn{

background:#222;
color:white;

transform:scale(1.08);
}


/* links */

a{
flex:1;
display:flex;
text-decoration:none;
color:inherit;
}


/* animação entrada */

@keyframes entrada{

from{
transform:translateY(40px);
opacity:0;
}

to{
transform:translateY(0);
opacity:1;
}

}

</style>
</head>

<body>

<div class="container">

<a href="/guias/guia-acf.html">
<div class="panel guia">
<div class="overlay">
<div class="title">GUIAS</div>
</div>
</div>
</a>

<a href="/produtos">
<div class="panel loja">
<div class="overlay">
<div class="title">LOJA</div>
<div class="btn">ACESSAR</div>
</div>
</div>
</a>

<a href="/mini-me">
<div class="panel minime">
<div class="overlay">
<div class="title">MINI-ME</div>
</div>
</div>
</a>

</div>

</body>
</html>
