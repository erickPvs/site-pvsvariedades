<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>PVS Variedades</title>

<style>

body{
margin:0;
font-family:Arial;
overflow:hidden;
}

.container{
display:flex;
height:100vh;
}

.panel{
flex:1;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
font-size:32px;
font-weight:bold;
cursor:pointer;

background-size:cover;
background-position:center;
background-repeat:no-repeat;

transition:all 0.5s ease;
filter:grayscale(100%);
}

.panel:hover{
flex:1.8;
filter:grayscale(0%);
}

.overlay{
background:rgba(0,0,0,0.45);
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
transition:background 0.4s;
}

.panel:hover .overlay{
background:rgba(0,0,0,0.25);
}

a{
flex:1;
text-decoration:none;
}

.guia{
background-image:url("images/guia.webp");
}

.loja{
background-image:url("images/loja.webp");
}

.minime{
background-image:url("images/minime.webp");
}

</style>

</head>

<body>

<div class="container">

<a href="/guias/guia-acf.html">
<div class="panel guia">
<div class="overlay">
GUIAS
</div>
</div>
</a>

<a href="/produtos">
<div class="panel loja">
<div class="overlay">
LOJA
</div>
</div>
</a>

<a href="/mini-me">
<div class="panel minime">
<div class="overlay">
MINI-ME
</div>
</div>
</a>

</div>

</body>
</html>
