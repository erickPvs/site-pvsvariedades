<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PVS Variedades</title>

<style>

html,body{
margin:0;
padding:0;
height:100%;
font-family:Arial, Helvetica, sans-serif;
background:#f2f2f2;
overflow:hidden;
}

/* CONTAINER */

.container{

display:flex;

height:100dvh;
width:100vw;

overflow:hidden;

}

/* PAINEL */

.panel{

flex:1;

position:relative;

display:flex;
align-items:center;
justify-content:center;

overflow:hidden;

cursor:pointer;

transition:.45s;

}

/* LOJA MAIOR */

.loja{
flex:1.35;
}

/* IMAGEM */

.panel::before{

content:"";

position:absolute;

width:100%;
height:100%;

background-size:cover;
background-position:center;
background-repeat:no-repeat;

filter:grayscale(100%) brightness(1.25) opacity(.45);

transition:.45s;

}

/* GRADIENTE */

.panel::after{

content:"";

position:absolute;

width:100%;
height:100%;

background:linear-gradient(
to bottom,
rgba(0,0,0,0) 40%,
rgba(0,0,0,.25) 100%
);

opacity:.7;

transition:.45s;

}

/* CURSOR LIGHT */

.light{

position:absolute;
width:100%;
height:100%;

pointer-events:none;

background:radial-gradient(
circle 350px at var(--x) var(--y),
rgba(255,255,255,.25),
transparent 60%
);

mix-blend-mode:soft-light;

opacity:0;

transition:opacity .2s;

}

.panel:hover .light{
opacity:1;
}

/* HOVER */

.panel:hover::before{

filter:grayscale(0%) brightness(1) opacity(1);

transform:scale(1.05);

}

.panel:hover::after{
opacity:.4;
}

.panel:hover{
flex:1.45;
z-index:5;
}

/* ACTIVE FOCUS */

.container:hover .panel{

filter:blur(2px) brightness(.85) saturate(.8);

}

.container:hover .panel:hover{

filter:none;

}

/* IMAGENS */

.guia::before{
background-image:url("images/guia.webp");
background-position:center 45%;
}

.loja::before{
background-image:url("images/loja.webp");
background-position:center 50%;
}

.minime::before{
background-image:url("images/minime.webp");
background-position:center;
}

/* TEXTO */

.overlay{

position:absolute;
bottom:140px;

text-align:center;

color:white;

z-index:3;

}

.title{

font-size:42px;
font-weight:bold;

letter-spacing:2px;

}

.subtitle{

font-size:16px;

margin-top:8px;

text-shadow:
0 -1px 0 rgba(0,0,0,1),
0 6px 12px rgba(0,0,0,.9),
0 18px 35px rgba(0,0,0,.8);

}

/* SOMBRAS */

.guia .title{

text-shadow:
-2px -2px 0 rgba(0,0,0,1),
-6px 6px 14px rgba(0,0,0,.9),
-18px 22px 55px rgba(0,0,0,.85);

}

.loja .title{

text-shadow:
0 -2px 0 rgba(0,0,0,1),
0 8px 18px rgba(0,0,0,.9),
0 24px 60px rgba(0,0,0,.85);

}

.minime .title{

text-shadow:
2px -2px 0 rgba(0,0,0,1),
6px 6px 14px rgba(0,0,0,.9),
18px 22px 55px rgba(0,0,0,.85);

}

/* BOTÃO */

.btn{

margin-top:20px;

padding:12px 30px;

border:2px solid white;

display:inline-block;

font-size:15px;

letter-spacing:1px;

transition:.3s;

}

.panel:hover .btn{

background:white;
color:black;

transform:scale(1.08);

}

/* LINK */

.panel a{

position:absolute;

width:100%;
height:100%;

top:0;
left:0;

z-index:5;

}

/* MOBILE */

@media (max-width:900px){

html,body{
overflow:auto;
}

.container{
flex-direction:column;
height:auto;
}

.panel{
height:34vh;
min-height:260px;
}

.overlay{
bottom:40px;
}

.title{
font-size:30px;
}

.container:hover .panel{
filter:none;
}

.light{
display:none;
}

}
</script>

</body>
</html>
