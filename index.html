<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>PVS Variedades</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#000;
overflow:hidden;
}

.container{
display:flex;
height:100vh;
width:100vw;
}

/* PAINÉIS */

.panel{
flex:1;
position:relative;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
overflow:hidden;
transition:all .45s ease;

animation:entrada 1.2s ease forwards;
opacity:0;
}

.panel:nth-child(1){animation-delay:.2s;}
.panel:nth-child(2){animation-delay:.5s;}
.panel:nth-child(3){animation-delay:.8s;}


/* IMAGEM */

.panel::before{

content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;

background-position:center;
background-repeat:no-repeat;
background-size:70%;

filter:grayscale(100%) brightness(1.8) opacity(.15);

transition:all .45s ease;
}

/* HOVER */

.panel:hover{
flex:1.25;
}

.panel:hover::before{
filter:grayscale(0%) brightness(1) opacity(1);
transform:scale(1.08);
}

/* EFEITO DE LUZ */

.panel::after{

content:"";
position:absolute;
top:0;
left:-120%;
width:120%;
height:100%;

background:linear-gradient(
90deg,
transparent,
rgba(255,255,255,.35),
transparent
);

transition:.8s;
}

.panel:hover::after{
left:120%;
}


/* IMAGENS */

.guia::before{
background-image:url("images/guia.webp");
}

.loja::before{
background-image:url("images/loja.webp");
background-size:65%;
}

.minime::before{
background-image:url("images/minime.webp");
background-size:60%;
}


/* TEXTO */

.overlay{

position:relative;
color:white;

font-size:40px;
font-weight:bold;
letter-spacing:2px;

text-align:center;

text-shadow:0 5px 25px rgba(0,0,0,.8);

z-index:2;
}

/* BOTÃO */

.btn{

margin-top:18px;
padding:10px 26px;

border:2px solid white;

display:inline-block;

font-size:14px;
letter-spacing:1px;

transition:.3s;
}

.panel:hover .btn{

background:white;
color:black;

transform:scale(1.08);
}


/* LINKS */

a{
text-decoration:none;
color:white;
flex:1;
display:flex;
}


/* ANIMAÇÃO ENTRADA */

@keyframes entrada{

from{
transform:translateY(80px);
opacity:0;
}

to{
transform:translateY(0);
opacity:1;
}

}

</style>

</head>


<body>


<div class="container">


<a href="/guias/guia-acf.html">

<div class="panel guia">

<div class="overlay">
GUIAS
</div>

</div>

</a>


<a href="/produtos">

<div class="panel loja">

<div class="overlay">

LOJA
<br>

<div class="btn">
ACESSAR
</div>

</div>

</div>

</a>


<a href="/mini-me">

<div class="panel minime">

<div class="overlay">
MINI-ME
</div>

</div>

</a>


</div>


</body>
</html>
