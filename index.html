<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>PVS Variedades</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f0f0f0;
overflow:hidden;
}

/* container */

.container{
display:flex;
height:100vh;
width:100vw;
}

/* painel */

.panel{

flex:1;

display:flex;
align-items:center;
justify-content:center;

position:relative;

cursor:pointer;
overflow:hidden;

transition:all .45s ease;

animation:entrada 1s ease forwards;
opacity:0;
}

.panel:nth-child(1){animation-delay:.2s;}
.panel:nth-child(2){animation-delay:.4s;}
.panel:nth-child(3){animation-delay:.6s;}


/* imagem watermark */

.panel::before{

content:"";

position:absolute;

width:100%;
height:100%;

background-position:center;
background-repeat:no-repeat;
background-size:cover;

filter:grayscale(100%) brightness(1.2) opacity(.35);

transition:all .45s ease;
}

/* hover */

.panel:hover{
flex:1.15;
}

.panel:hover::before{

filter:grayscale(0%) brightness(1) opacity(1);

transform:scale(1.08);
}


/* efeito de luz */

.panel::after{

content:"";

position:absolute;

top:0;
left:-120%;

width:120%;
height:100%;

background:linear-gradient(
90deg,
transparent,
rgba(255,255,255,.35),
transparent
);

transition:.8s;
}

.panel:hover::after{
left:120%;
}


/* imagens */

.guia::before{
background-image:url("images/guia.webp");
background-position:center 45%;
}

.loja::before{
background-image:url("images/loja.webp");
background-position:center 50%;
}

.minime::before{
background-image:url("images/minime.webp");
background-position:center;
}


/* texto */

.overlay{

position:relative;

text-align:center;

z-index:2;
}

.title{

font-size:42px;
font-weight:bold;

letter-spacing:2px;

color:white;

text-shadow:0 5px 25px rgba(0,0,0,.7);
}


/* botão */

.btn{

margin-top:16px;

padding:10px 26px;

border:2px solid white;

display:inline-block;

font-size:14px;

transition:.3s;
}

.panel:hover .btn{

background:white;
color:black;

transform:scale(1.08);
}


/* links */

a{
flex:1;
display:flex;
text-decoration:none;
color:inherit;
}


/* animação entrada */

@keyframes entrada{

from{
transform:translateY(50px);
opacity:0;
}

to{
transform:translateY(0);
opacity:1;
}

}

</style>
</head>


<body>

<div class="container">

<a href="/guias/guia-acf.html">
<div class="panel guia">
<div class="overlay">
<div class="title">GUIAS</div>
</div>
</div>
</a>


<a href="/produtos">
<div class="panel loja">
<div class="overlay">
<div class="title">LOJA</div>
<div class="btn">ACESSAR</div>
</div>
</div>
</a>


<a href="/mini-me">
<div class="panel minime">
<div class="overlay">
<div class="title">MINI-ME</div>
</div>
</div>
</a>

</div>

</body>
</html>
