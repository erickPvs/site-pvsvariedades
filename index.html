<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>PVS Variedades</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
}

.container{
display:flex;
height:100vh;
width:100%;
}

a{
flex:1;
text-decoration:none;
color:white;
}

.panel{
flex:1;
position:relative;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
cursor:pointer;
transition:all 0.5s ease;
}

.panel:hover{
flex:1.6;
}

/* imagem de fundo */

.panel::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background-size:cover;
background-position:center;
transition:transform 1.2s ease, filter 0.6s ease;

/* estado neutro */
filter:grayscale(80%) brightness(35%);
}

/* estado hover */

.panel:hover::before{
transform:scale(1.08);
filter:grayscale(0%) brightness(100%) saturate(120%);
}

/* gradiente para leitura */

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;

background:linear-gradient(
to bottom,
rgba(0,0,0,0.6),
rgba(0,0,0,0.2)
);
}

/* conteúdo */

.content{
text-align:center;
z-index:2;
}

.content h1{
font-size:40px;
letter-spacing:3px;
margin:0;
}

.content p{
margin-top:10px;
font-size:16px;
opacity:0;
transition:0.4s;
}

.btn{
display:inline-block;
margin-top:18px;
padding:10px 22px;
border:2px solid white;
font-size:14px;
letter-spacing:1px;
opacity:0;
transition:0.4s;
}

.panel:hover p,
.panel:hover .btn{
opacity:1;
}

/* imagens */

.guia::before{
background-image:url("images/guia.webp");
}

.loja::before{
background-image:url("images/loja.webp");
}

.minime::before{
background-image:url("images/minime.webp");
}

</style>

</head>

<body>

<div class="container">

<a href="/guias/guia-acf.html">
<div class="panel guia">
<div class="overlay">
<div class="content">
<h1>GUIAS</h1>
<p>Manutenção e dicas de impressão 3D</p>
<div class="btn">ACESSAR</div>
</div>
</div>
</div>
</a>

<a href="/produtos">
<div class="panel loja">
<div class="overlay">
<div class="content">
<h1>LOJA</h1>
<p>Consumíveis e acessórios</p>
<div class="btn">ACESSAR</div>
</div>
</div>
</div>
</a>

<a href="/mini-me">
<div class="panel minime">
<div class="overlay">
<div class="content">
<h1>MINI-ME</h1>
<p>Seu boneco caricato em 3D</p>
<div class="btn">ACESSAR</div>
</div>
</div>
</div>
</a>

</div>

</body>
</html>
