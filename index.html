<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>PVS Variedades</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f2f2f2;
overflow:hidden;
}

/* CONTAINER */

.container{
display:flex;
height:100vh;
width:100vw;
}

/* PAINÉIS */

.panel{

flex:1;

position:relative;

display:flex;
align-items:flex-end;
justify-content:center;

padding-bottom:80px;

overflow:hidden;

cursor:pointer;

transition:.45s;
}

/* LOJA MAIOR */

.loja{
flex:1.35;
}

/* IMAGEM */

.panel::before{

content:"";

position:absolute;

width:100%;
height:100%;

background-size:cover;
background-position:center;
background-repeat:no-repeat;

filter:grayscale(100%) brightness(1.25) opacity(.45);

transition:.45s;

}

/* HOVER */

.panel:hover::before{

filter:grayscale(0%) brightness(1) opacity(1);

transform:scale(1.07);
}

/* EXPANSÃO */

.panel:hover{
flex:1.45;
}

/* EFEITO DE LUZ */

.panel::after{

content:"";

position:absolute;

top:0;
left:-120%;

width:120%;
height:100%;

background:linear-gradient(
90deg,
transparent,
rgba(255,255,255,.35),
transparent
);

transition:.8s;
}

.panel:hover::after{
left:120%;
}

/* IMAGENS */

.guia::before{
background-image:url("images/guia.webp");
background-position:center 45%;
}

.loja::before{
background-image:url("images/loja.webp");
background-position:center 50%;
}

.minime::before{
background-image:url("images/minime.webp");
background-position:center;
}

/* OVERLAY */

.overlay{

position:relative;

z-index:2;

text-align:center;

color:white;
}

/* TITULO */

.title{

font-size:42px;
font-weight:bold;

letter-spacing:2px;
}

/* GUIAS sombra esquerda */

.guia .title{

text-shadow:
-2px 2px 0 rgba(0,0,0,1),
-6px 6px 14px rgba(0,0,0,.9),
-18px 22px 55px rgba(0,0,0,.85);

}

/* LOJA sombra central */

.loja .title{

text-shadow:
0 2px 0 rgba(0,0,0,1),
0 8px 18px rgba(0,0,0,.9),
0 24px 60px rgba(0,0,0,.85);

}

/* MINI-ME sombra direita */

.minime .title{

text-shadow:
2px 2px 0 rgba(0,0,0,1),
6px 6px 14px rgba(0,0,0,.9),
18px 22px 55px rgba(0,0,0,.85);

}

/* SUBTÍTULO */

.subtitle{

font-size:15px;

margin-top:8px;

opacity:.95;

text-shadow:0 3px 10px rgba(0,0,0,.95);
}

/* BOTÃO */

.btn{

margin-top:20px;

padding:10px 28px;

border:2px solid white;

display:inline-block;

font-size:14px;

letter-spacing:1px;

transition:.3s;

text-shadow:none;
}

.panel:hover .btn{

background:white;
color:black;

transform:scale(1.08);
}

/* LINK INVISIVEL */

.panel a{

position:absolute;

width:100%;
height:100%;

top:0;
left:0;

z-index:3;
}

/* SOMBRA PREMIUM */

.panel:hover{

box-shadow:0 20px 60px rgba(0,0,0,.25);
}

</style>

</head>


<body>

<div class="container">


<div class="panel guia">

<a href="/guias/guia-acf.html"></a>

<div class="overlay">

<div class="title">GUIAS</div>
<div class="subtitle">Tutoriais e manutenção</div>

<div class="btn">ACESSAR</div>

</div>

</div>


<div class="panel loja">

<a href="/produtos"></a>

<div class="overlay">

<div class="title">LOJA</div>
<div class="subtitle">Consumíveis e acessórios</div>

<div class="btn">ACESSAR</div>

</div>

</div>


<div class="panel minime">

<a href="/mini-me"></a>

<div class="overlay">

<div class="title">MINI-ME</div>
<div class="subtitle">Seu boneco caricato</div>

<div class="btn">ACESSAR</div>

</div>

</div>


</div>

</body>
</html>
