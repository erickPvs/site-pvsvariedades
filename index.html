<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>PVS Variedades</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f3f3f3;
overflow:hidden;
}

/* CONTAINER */

.container{
display:flex;
height:100vh;
width:100vw;
}

/* PAINÉIS */

.panel{

display:flex;
align-items:center;
justify-content:center;

position:relative;

cursor:pointer;
overflow:hidden;

transition:all .45s ease;

animation:entrada 1s ease forwards;
opacity:0;
}

/* proporção dos painéis */

.guia{flex:1;}
.loja{flex:1.35;}
.minime{flex:1;}

.panel:nth-child(1){animation-delay:.2s;}
.panel:nth-child(2){animation-delay:.4s;}
.panel:nth-child(3){animation-delay:.6s;}

/* IMAGEM */

.panel::before{

content:"";

position:absolute;

width:100%;
height:100%;

background-size:cover;
background-repeat:no-repeat;
background-position:center;

filter:grayscale(100%) brightness(1.25) opacity(.38);

transition:all .45s ease;
}

/* HOVER */

.panel:hover::before{

filter:grayscale(0%) brightness(1) opacity(1);

transform:scale(1.07);
}

/* EXPANSÃO LEVE */

.panel:hover{
flex:1.45;
}

/* EFEITO DE LUZ */

.panel::after{

content:"";

position:absolute;

top:0;
left:-120%;

width:120%;
height:100%;

background:linear-gradient(
90deg,
transparent,
rgba(255,255,255,.35),
transparent
);

transition:.8s;
}

.panel:hover::after{
left:120%;
}

/* IMAGENS */

.guia::before{
background-image:url("images/guia.webp");
background-position:center 45%;
}

.loja::before{
background-image:url("images/loja.webp");
background-position:center 50%;
}

.minime::before{
background-image:url("images/minime.webp");
background-position:center;
}

/* OVERLAY */

.overlay{

position:relative;

text-align:center;

z-index:2;
}

/* TEXTO */

.title{

font-size:42px;
font-weight:bold;

letter-spacing:2px;

color:white;

text-shadow:0 6px 25px rgba(0,0,0,.65);
}

/* SUBTÍTULO */

.subtitle{

font-size:15px;

margin-top:8px;

opacity:.9;
}

/* BOTÃO */

.btn{

margin-top:18px;

padding:10px 28px;

border:2px solid white;

display:inline-block;

font-size:14px;

letter-spacing:1px;

transition:.3s;
}

.panel:hover .btn{

background:white;
color:black;

transform:scale(1.08);
}

/* LINKS */

a{
display:flex;
text-decoration:none;
color:inherit;
}

/* ANIMAÇÃO */

@keyframes entrada{

from{
transform:translateY(50px);
opacity:0;
}

to{
transform:translateY(0);
opacity:1;
}

}

</style>

</head>


<body>

<div class="container">


<a href="/guias/guia-acf.html">

<div class="panel guia">

<div class="overlay">

<div class="title">GUIAS</div>
<div class="subtitle">Tutoriais e manutenção</div>

</div>

</div>

</a>


<a href="/produtos">

<div class="panel loja">

<div class="overlay">

<div class="title">LOJA</div>
<div class="subtitle">Consumíveis e acessórios</div>

<div class="btn">
ACESSAR
</div>

</div>

</div>

</a>


<a href="/mini-me">

<div class="panel minime">

<div class="overlay">

<div class="title">MINI-ME</div>
<div class="subtitle">Seu boneco caricato</div>

</div>

</div>

</a>


</div>

</body>
</html>
