<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>PVS Variedades</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
}

.container{
display:flex;
width:100%;
height:100vh;
}

a{
flex:1;
text-decoration:none;
color:white;
}

.panel{
flex:1;
position:relative;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
cursor:pointer;
overflow:hidden;

background-size:cover;
background-position:center;
background-repeat:no-repeat;

transition:all 0.5s ease;

filter:grayscale(80%) brightness(35%);
}
.panel:hover{
flex:1.8;
filter:grayscale(0%) brightness(100%) saturate(120%);
}
.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;

background:linear-gradient(
to bottom,
rgba(0,0,0,0.65),
rgba(0,0,0,0.25)
);
}

.content{
text-align:center;
padding:20px;
}

.content h1{
font-size:40px;
margin:0;
letter-spacing:2px;
}

.content p{
font-size:16px;
margin-top:10px;
opacity:0;
transition:0.3s;
}

.btn{
display:inline-block;
margin-top:15px;
padding:10px 22px;
border:2px solid white;
font-size:14px;
letter-spacing:1px;
opacity:0;
transition:0.3s;
}

.panel:hover p,
.panel:hover .btn{
opacity:1;
}

.guia{
background-image:url("images/guia.webp");
}

.loja{
background-image:url("images/loja.webp");
}

.minime{
background-image:url("images/minime.webp");
}
</style>

</head>

<body>

<div class="container">

<a href="/guias/guia-acf.html">
<div class="panel guia">
<div class="overlay">
<div class="content">
<h1>GUIAS</h1>
<p>Manutenção e dicas de impressão 3D</p>
<span class="btn">ACESSAR</span>
</div>
</div>
</div>
</a>

<a href="/produtos">
<div class="panel loja">
<div class="overlay">
<div class="content">
<h1>LOJA</h1>
<p>Consumíveis e acessórios</p>
<span class="btn">ACESSAR</span>
</div>
</div>
</div>
</a>

<a href="/mini-me">
<div class="panel minime">
<div class="overlay">
<div class="content">
<h1>MINI-ME</h1>
<p>Seu boneco caricato em 3D</p>
<span class="btn">ACESSAR</span>
</div>
</div>
</div>
</a>

</div>

</body>
</html>
