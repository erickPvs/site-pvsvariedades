<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>PVS Variedades</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
overflow:hidden;
}

.container{
display:flex;
height:100vh;
}

/* BARRAS */

.panel{
flex:1;
position:relative;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:all 0.45s ease;
overflow:hidden;
}

/* IMAGEM DE FUNDO */

.panel::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background-size:cover;
background-position:center;
filter:grayscale(100%) brightness(1.3) opacity(0.18);
transition:all 0.45s ease;
}

/* HOVER */

.panel:hover{
flex:1.2;
}

.panel:hover::before{
filter:grayscale(0%) brightness(1.05) opacity(0.95);
transform:scale(1.08);
}

/* IMAGENS */

.guia::before{
background-image:url("images/guia.webp");
}

.loja::before{
background-image:url("images/loja.webp");
}

.minime::before{
background-image:url("images/minime.webp");
}

/* TEXTO */

.overlay{
position:relative;
color:white;
font-size:38px;
font-weight:bold;
letter-spacing:2px;
text-align:center;
text-shadow:0 4px 18px rgba(0,0,0,0.7);
z-index:2;
}

/* BOTÃO */

.btn{
margin-top:18px;
padding:10px 22px;
border:2px solid white;
display:inline-block;
font-size:14px;
letter-spacing:1px;
}

a{
text-decoration:none;
color:white;
flex:1;
display:flex;
}

</style>

</head>

<body>

<div class="container">

<a href="/guias/guia-acf.html">
<div class="panel guia">
<div class="overlay">
GUIAS
</div>
</div>
</a>

<a href="/produtos">
<div class="panel loja">
<div class="overlay">
LOJA
<br>
<div class="btn">ACESSAR</div>
</div>
</div>
</a>

<a href="/mini-me">
<div class="panel minime">
<div class="overlay">
MINI-ME
</div>
</div>
</a>

</div>

</body>
</html>
